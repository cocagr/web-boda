<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>Laura & Leandro | Nuestra Boda</title>

  <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <style>
    /* Reset básico para asegurar consistencia entre navegadores (Safari, Chrome, etc.) */
    html, body, #root {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      /* Aplicamos el color crema base de fondo para evitar parpadeos blancos al cargar */
      background-color: #F7F4EF; 
      /* Suavizado de tipografías para pantallas Retina y móviles */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Estilo global para la barra de desplazamiento (Scrollbar) a juego con el diseño */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #F7F4EF;
    }
    ::-webkit-scrollbar-thumb {
      background: #6B7C4A; /* El verde olivo para el scroll */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #5A693E;
    }
  </style>
</head>
<body>

  <div id="root"></div>

</body>
</html>
